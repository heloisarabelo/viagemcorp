<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Recuperar Acesso - ViagemCorp</title>
<style>
  body{font-family:sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .card{background:#fff;border-radius:12px;padding:32px;width:360px;box-shadow:0 2px 12px rgba(0,0,0,.1);text-align:center}
  h2{margin:0 0 8px;color:#1e40af}
  p{color:#666;font-size:13px;margin:0 0 24px}
  .btn{width:100%;padding:14px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  .btn:hover{background:#1e3a8a}
  .btn-sec{background:#e5e7eb;color:#374151}
  .btn-sec:hover{background:#d1d5db}
  .msg{margin-top:16px;padding:12px;border-radius:8px;font-size:13px;display:none}
  .msg.ok{background:#dcfce7;color:#166534;display:block}
  .msg.err{background:#fee2e2;color:#991b1b;display:block}
</style>
</head>
<body>
<div class="card">
  <h2>🔧 Recuperar Acesso</h2>
  <p>Esta página limpa o cache local e restaura o acesso ao ViagemCorp.</p>
  <button class="btn" onclick="recuperar()">Restaurar e Acessar</button>
  <button class="btn btn-sec" style="margin-top:8px" onclick="window.location.href='https://heloisarabelo.github.io/viagemcorp/'">Voltar ao ViagemCorp</button>
  <div class="msg" id="msg"></div>
</div>
<script>
function recuperar(){
  try{
    // Limpa localStorage corrompido
    localStorage.removeItem('vc3');
    // Cria estado inicial com usuario heloisa
    var estado = {
      usuarios:[
        {id:'admin',login:'admin',senha:'admin123',nome:'Administrador',cargo:'Administrativo',tipo:'admin',email:'administrativo@groupsoftware.com.br'},
        {id:'heloisa',login:'heloisa',senha:'123456',nome:'Heloisa Rabelo',cargo:'Diretora Backoffice',tipo:'admin',email:'heloisa.rabelo@groupsoftware.com.br'}
      ],
      agencias:[
        {id:'ag1',nome:'Trip One Travel',tipo:'passagem_principal',url:'',login:'',senha:'',contato:'',obs:'Agencia principal para passagens'},
        {id:'ag2',nome:'Estacao Turismo',tipo:'hospedagem',url:'',login:'',senha:'',contato:'',obs:'Agencia exclusiva para hospedagem'},
        {id:'ag3',nome:'Maac Travel',tipo:'passagem_backup',url:'',login:'',senha:'',contato:'',obs:'Backup para passagens'}
      ],
      vinculos:{mkt_comercial:'',filial_matriz:'',implantacao:'',produto:'',treinamento_eventos:''},
      sols:[],
      regras:{prazo:30}
    };
    localStorage.setItem('vc3', JSON.stringify(estado));
    document.getElementById('msg').className='msg ok';
    document.getElementById('msg').textContent='✅ Acesso restaurado! Redirecionando...';
    setTimeout(function(){ window.location.href='https://heloisarabelo.github.io/viagemcorp/'; }, 2000);
  }catch(e){
    document.getElementById('msg').className='msg err';
    document.getElementById('msg').textContent='Erro: '+e.message;
  }
}
</script>
</body>
</html>
